<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFR Airway Study</title>
<style>
body{margin:0;padding:20px;font-family:Arial;background:#eef2f7}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
.diagram-inner{position:relative;height:240px;background:#f3f4f6;border-radius:10px}
.point{position:absolute;transform:translate(-50%,-50%)}
.symbol{width:30px;height:30px}
.point-label{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:12px}
.radial{position:absolute;top:50%;transform:translateY(-50%);width:50px;text-align:center}
.radial-left{right:60px}
.radial-right{left:60px}
.route-svg{position:absolute;inset:0}
.line-label{position:absolute;transform:translate(-50%,-50%)}
.total-box{border:2px solid #000;padding:4px 6px;background:#fff}
.route-name{font-weight:bold}
</style>
</head>
<body>
<div id="app"></div>
<script>
const data=[`POINT1: MLU:VORTAC:072
POINT2: MHZ:VORTAC:281
POINT3: none
NAVAIDS: true
NAVAID1: HATER:true:1
NAVAID2: none
NAVAID3: none
NAVAID4: none
SEG1: 49
SEG2: 49
SEG3: none
SEG4: none
SEG5: none
TOTALDISTANCE1: 98
TOTALDISTANCE2: none
ROUTENAME: V427`,
`POINT1: MLU:VORTAC:087
POINT2: MHZ:VORTAC:266:091
POINT3: MEI:VORTAC:272
NAVAIDS: true
NAVAID1: STUEE:true:1
NAVAID2: DINKY:false:1
NAVAID3: HEDUD:false:1
NAVAID4: none
SEG1: 19
SEG2: 12
SEG3: 41
SEG4: 23
SEG5: none
TOTALDISTANCE1: 95
TOTALDISTANCE2: 70
ROUTENAME: V417`,
`POINT1: MLU:VORTAC:102
POINT2: MHZ:VORTAC:251:106
POINT3: END:VORTAC:257
NAVAIDS: true
NAVAID1: DORTS:true:1
NAVAID2: none
NAVAID3: none
NAVAID4: none
SEG1: 49
SEG2: 49
SEG3: none
SEG4: none
SEG5: none
TOTALDISTANCE1: 98
TOTALDISTANCE2: 72
ROUTENAME: V417`];

function norm(v){return String(v||"").trim().toUpperCase()}

function parse(block){
let m={}
block.split("\n").forEach(l=>{
let i=l.indexOf(":")
if(i>0)m[l.slice(0,i).trim()]=l.slice(i+1).trim()
})
return m
}

function pPoint(v,id){
if(!v||norm(v)==="NONE")return null
let a=v.split(":")
return{ id,label:a[0],leave:a[2]||"",arrive:a[3]||"" }
}

function pNav(v,id){
if(!v||norm(v)==="NONE")return null
let a=v.split(":")
return{ id,label:a[0],sec:Number(a[2]||1) }
}

function build(block,i){
let m=parse(block)
let p1=pPoint(m.POINT1,"p1")
let p2=pPoint(m.POINT2,"p2")
let p3=pPoint(m.POINT3,"p3")
let n=[1,2,3,4].map(x=>pNav(m[`NAVAID${x}`],"n"+x)).filter(Boolean)
let left=n.filter(x=>x.sec===1)
let right=n.filter(x=>x.sec===2)
let pts=[p1,...left,p2,...right,p3].filter(Boolean)

let out=[]
let start=80,end=820
pts.forEach((p,idx)=>{
let x=start+(end-start)*(idx/(pts.length-1))
out.push({...p,x,y:140})
})

return{points:out,name:m.ROUTENAME,tot1:m.TOTALDISTANCE1,tot2:m.TOTALDISTANCE2}
}

function render(a){
let html=`<div class="card"><div class="diagram-inner">`

html+=`<svg class="route-svg">`
for(let i=0;i<a.points.length-1;i++){
let s=a.points[i]
let e=a.points[i+1]
html+=`<line x1="${s.x+70}" y1="140" x2="${e.x-70}" y2="140" stroke="blue"/>`
}
html+=`</svg>`

html+=a.points.map(p=>`
<div class="point" style="left:${p.x}px;top:140px">
<div class="point-label">${p.label}</div>
<img src="assets/icons/vortac.png" class="symbol"/>
${p.leave?`<input class="radial radial-right" value="${p.leave}">`:""}
${p.arrive?`<input class="radial radial-left" value="${p.arrive}">`:""}
</div>`).join("")

html+=`<div class="line-label" style="left:450px;top:180px">
<div class="route-name">${a.name}</div>
<div class="total-box">${a.tot1}</div>
</div>`

html+=`</div></div>`
return html
}

document.getElementById("app").innerHTML=data.map((d,i)=>render(build(d,i))).join("")
</script>
</body>
</html>
