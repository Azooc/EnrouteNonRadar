<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFR Airway Study</title>
  <style>
    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #315efb;
      --border: #cbd5e1;
      --ok: #dcfce7;
      --okb: #16a34a;
      --bad: #fee2e2;
      --badb: #dc2626;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1400px; margin: 0 auto; }
    h1 { margin: 0 0 8px; }
    .lead { margin: 0 0 20px; color: var(--muted); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 22px; box-shadow: 0 10px 24px rgba(0,0,0,.06); }
    .title { font-size: 1.15rem; font-weight: 700; margin-bottom: 14px; }
    .diagram { overflow-x: auto; }
    .diagram-inner { position: relative; min-width: 920px; height: 250px; background: #f3f4f6; border: 1px solid #dbe3ec; border-radius: 14px; overflow: hidden; }
    .route-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .point { position: absolute; transform: translate(-50%, -50%); z-index: 3; }
    .major { width: 180px; height: 110px; }
    .minor { width: 90px; height: 80px; }
    .symbol-wrap { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .symbol { width: 30px; height: 30px; object-fit: contain; display: block; }
    .point-label { position: absolute; left: 50%; transform: translateX(-50%); text-transform: uppercase; background: #dcfce7; border: 1px solid #22c55e; border-radius: 8px; padding: 4px 8px; text-align: center; }
    .major-label { top: -34px; font-size: 1rem; font-weight: 700; min-width: 56px; }
    .minor-label { top: -34px; font-size: .9rem; min-width: 74px; }
    .radial { position: absolute; top: 50%; transform: translateY(-50%); width: 58px; text-align: center; background: #dcfce7; border: 1px solid #22c55e; border-radius: 8px; padding: 4px 6px; }
    .radial-left { right: calc(50% + 28px); }
    .radial-right { left: calc(50% + 28px); }
    .line-label { position: absolute; transform: translate(-50%, -50%); z-index: 4; }
    .seg-box, .route-box { background: #dcfce7; border: 1px solid #22c55e; border-radius: 8px; padding: 4px 6px; text-align: center; }
    .seg-box { width: 54px; }
    .route-box { width: 72px; text-transform: uppercase; font-weight: 700; }
    .total-box { width: 62px; background: #fff; border: 2px solid #222; padding: 4px 6px; text-align: center; font-weight: 700; }
    .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
    button { border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-size: .95rem; }
    .btn-primary { background: #0f172a; color: white; }
    .btn-secondary { background: #e5e7eb; }
    .status { min-height: 22px; margin-top: 12px; font-weight: 700; }
    .correct { background: var(--ok) !important; border-color: var(--okb) !important; }
    .wrong { background: var(--bad) !important; border-color: var(--badb) !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>IFR Airway Study</h1>
    <p class="lead">Type answers directly on the chart. Route name is shown above total mileage.</p>
    <div id="app"></div>
  </div>

  <script>
    const airwayTextData = [
`POINT1: MLU:VORTAC:087
POINT2: MEI:VORTAC:272
POINT3: none
NAVAID1: none
NAVAID2: none
NAVAID3: none
NAVAID4: none
SEG1: 98
SEG2: none
SEG3: none
SEG4: none
SEG5: none
TOTALDISTANCE1: 98
TOTALDISTANCE2: none
ROUTENAME: V417`,
`POINT1: MLU:VORTAC:087
POINT2: MEI:VORTAC:272
POINT3: none
NAVAID1: STUEE:false:1
NAVAID2: none
NAVAID3: none
NAVAID4: none
SEG1: 15
SEG2: 83
SEG3: none
SEG4: none
SEG5: none
TOTALDISTANCE1: 98
TOTALDISTANCE2: none
ROUTENAME: V417`,
`POINT1: MLU:VORTAC:087
POINT2: MHZ:VORTAC:266:091
POINT3: MEI:VORTAC:272
NAVAID1: STUEE:true:1
NAVAID2: DINKY:false:1
NAVAID3: HEDUD:false:2
NAVAID4: none
SEG1: 19
SEG2: 12
SEG3: 41
SEG4: 23
SEG5: none
TOTALDISTANCE1: 95
TOTALDISTANCE2: 70
ROUTENAME: V417`
    ];

    function normalize(v) { return String(v || '').trim().toUpperCase().replace(/\s+/g, ''); }

    function parseBlock(block) {
      const out = {};
      String(block).split(/\r?\n/).map(s => s.trim()).filter(Boolean).forEach(line => {
        const i = line.indexOf(':');
        if (i === -1) return;
        out[line.slice(0, i).trim().toUpperCase()] = line.slice(i + 1).trim();
      });
      return out;
    }

    function parsePoint(text, num) {
      if (!text || normalize(text) === 'NONE') return null;
      const p = text.split(':').map(s => s.trim());
      const kind = normalize(p[1]).replace('/', '') === 'VORDME' ? 'vordme' : 'vortac';
      return {
        id: `p${num}`,
        label: p[0] || `P${num}`,
        kind,
        arriveRadial: num === 1 ? '' : (p[2] || ''),
        leaveRadial: num === 1 ? (p[2] || '') : (p[3] || ''),
        major: true
      };
    }

    function parseNavaid(text, num) {
      if (!text || normalize(text) === 'NONE') return null;
      const p = text.split(':').map(s => s.trim());
      const second = normalize(p[1] || '');
      const hasReporting = second === 'TRUE' || second === 'FALSE';
      return {
        id: `n${num}`,
        label: p[0] || `N${num}`,
        kind: 'navaid',
        reporting: hasReporting ? second === 'TRUE' : false,
        section: Number(hasReporting ? (p[2] || '1') : (p[1] || '1')) || 1,
        major: false
      };
    }

    function buildAirway(block, idx) {
      const m = parseBlock(block);
      const p1 = parsePoint(m.POINT1, 1);
      const p2 = parsePoint(m.POINT2, 2);
      const p3 = parsePoint(m.POINT3, 3);
      const navaids = [1,2,3,4].map(i => parseNavaid(m[`NAVAID${i}`], i)).filter(Boolean);
      const segVals = [1,2,3,4,5].map(i => m[`SEG${i}`]).map(v => v && normalize(v) !== 'NONE' ? v : '');
      const width = p3 ? 1320 : 920;
      const height = 250;
      const lineY = 145;
      let points = [];

      if (!p3) {
        const ordered = [p1, ...navaids, p2].filter(Boolean);
        const startX = 60, endX = 840;
        const count = Math.max(ordered.length - 1, 1);
        points = ordered.map((p, i) => ({ ...p, x: startX + ((endX - startX) * i / count), y: lineY }));
      } else {
        const leftNavaids = navaids.filter(n => n.section === 1);
        const rightNavaids = navaids.filter(n => n.section === 2);
        const leftPoints = [p1, ...leftNavaids, p2].filter(Boolean);
        const rightPoints = [p2, ...rightNavaids, p3].filter(Boolean);
        const leftCount = Math.max(leftPoints.length - 1, 1);
        const rightCount = Math.max(rightPoints.length - 1, 1);
        const left = leftPoints.map((p, i) => ({ ...p, x: 60 + ((820 - 60) * i / leftCount), y: lineY }));
        const right = rightPoints.slice(1).map((p, i) => ({ ...p, x: 820 + ((1220 - 820) * (i + 1) / rightCount), y: lineY }));
        points = [...left, ...right];
      }

      const segments = [];
      for (let i = 0; i < points.length - 1; i++) {
        segments.push({ id: `s${i+1}`, from: points[i].id, to: points[i+1].id, subMileage: segVals[i] || '' });
      }

      const fp1 = points.find(p => p.id === 'p1');
      const fp2 = points.find(p => p.id === 'p2');
      const fp3 = points.find(p => p.id === 'p3');
      const totals = [];
      if (m.TOTALDISTANCE1 && normalize(m.TOTALDISTANCE1) !== 'NONE' && fp1 && fp2) totals.push({ x: (fp1.x + fp2.x)/2, y: lineY + 56, mileage: m.TOTALDISTANCE1, name: m.ROUTENAME || '' });
      if (m.TOTALDISTANCE2 && normalize(m.TOTALDISTANCE2) !== 'NONE' && fp2 && fp3) totals.push({ x: (fp2.x + fp3.x)/2, y: lineY + 56, mileage: m.TOTALDISTANCE2, name: m.ROUTENAME || '' });

      return { id: `airway-${idx+1}`, title: `${m.ROUTENAME || 'Airway'} example ${idx+1}`, width, height, lineY, points, segments, totals };
    }

    const airways = airwayTextData.map(buildAirway);

    function pointById(airway, id) { return airway.points.find(p => p.id === id); }
    function inputHTML(value, cls) { return `<input class="${cls}" data-answer="${String(value || '')}" autocomplete="off" spellcheck="false" />`; }

    function vortacHTML() { return '<img src="assets/icons/vortac.png" class="symbol" />'; }
    function vordmeHTML() { return '<img src="assets/icons/vordme.png" class="symbol" />'; }
    function navaidHTML(reporting) { return `<svg class="symbol" viewBox="0 0 100 100"><polygon points="50,15 85,80 15,80" fill="${reporting ? '#000' : '#fff'}" stroke="#000" stroke-width="6"></polygon></svg>`; }
    function symbolHTML(point) { if (point.kind === 'vordme') return vordmeHTML(); if (point.kind === 'vortac') return vortacHTML(); return navaidHTML(!!point.reporting); }

    function getAnchor(point, side) {
      if (!point.major) return { x: point.x, y: point.y };
      if (side === 'start') return { x: point.x + (point.leaveRadial ? 88 : 18), y: point.y };
      return { x: point.x - (point.arriveRadial ? 88 : 18), y: point.y };
    }

    function renderSegments(airway) {
      return airway.segments.map((seg, i) => {
        const from = pointById(airway, seg.from);
        const to = pointById(airway, seg.to);
        const start = getAnchor(from, 'start');
        const end = getAnchor(to, 'end');
        const midX = (start.x + end.x) / 2;
        const labelY = airway.lineY - 24;
        return `
          <line x1="${start.x}" y1="${airway.lineY}" x2="${end.x}" y2="${airway.lineY}" stroke="#315efb" stroke-width="3" />
          ${seg.subMileage ? `<foreignObject x="${midX - 27}" y="${labelY - 15}" width="54" height="32"><div xmlns="http://www.w3.org/1999/xhtml">${inputHTML(seg.subMileage, 'seg-box')}</div></foreignObject>` : ''}
        `;
      }).join('');
    }

    function renderTotals(airway) {
      return airway.totals.map(t => `
        <div class="line-label" style="left:${t.x}px;top:${t.y - 26}px;"><div class="route-box">${t.name}</div></div>
        <div class="line-label" style="left:${t.x}px;top:${t.y}px;">${inputHTML(t.mileage, 'total-box')}</div>
      `).join('');
    }

    function renderPoints(airway) {
      return airway.points.map(p => {
        if (p.major) {
          return `
            <div class="point major" style="left:${p.x}px;top:${airway.lineY}px;">
              <div class="point-label major-label">${p.label}</div>
              <div class="symbol-wrap">${symbolHTML(p)}</div>
              ${p.arriveRadial ? inputHTML(p.arriveRadial, 'radial radial-left') : ''}
              ${p.leaveRadial ? inputHTML(p.leaveRadial, 'radial radial-right') : ''}
            </div>`;
        }
        return `
          <div class="point minor" style="left:${p.x}px;top:${airway.lineY}px;">
            <div class="point-label minor-label">${p.label}</div>
            <div class="symbol-wrap">${symbolHTML(p)}</div>
          </div>`;
      }).join('');
    }

    function renderAirway(airway) {
      return `
        <div class="card" data-airway-id="${airway.id}">
          <div class="title">${airway.title}</div>
          <div class="diagram">
            <div class="diagram-inner" style="width:${airway.width}px;height:${airway.height}px;">
              <svg class="route-svg" viewBox="0 0 ${airway.width} ${airway.height}" preserveAspectRatio="none">${renderSegments(airway)}</svg>
              ${renderTotals(airway)}
              ${renderPoints(airway)}
            </div>
          </div>
          <div class="controls">
            <button class="btn-primary" onclick="checkAirway('${airway.id}')">Check</button>
            <button class="btn-secondary" onclick="showAnswers('${airway.id}')">Show Correct Answers</button>
            <button class="btn-secondary" onclick="resetAirway('${airway.id}')">Reset</button>
          </div>
          <div class="status" id="status-${airway.id}"></div>
        </div>`;
    }

    function clearMarks(card) { card.querySelectorAll('input[data-answer]').forEach(i => i.classList.remove('correct', 'wrong')); }
    function checkAirway(id) {
      const card = document.querySelector(`[data-airway-id="${id}"]`);
      const status = document.getElementById(`status-${id}`);
      const inputs = [...card.querySelectorAll('input[data-answer]')];
      let okAll = true;
      clearMarks(card);
      inputs.forEach(i => { const ok = normalize(i.value) === normalize(i.dataset.answer); i.classList.add(ok ? 'correct' : 'wrong'); if (!ok) okAll = false; });
      status.textContent = okAll ? 'All answers are correct.' : 'Some answers are wrong.';
      status.style.color = okAll ? '#15803d' : '#b91c1c';
    }
    function showAnswers(id) {
      const card = document.querySelector(`[data-airway-id="${id}"]`);
      const status = document.getElementById(`status-${id}`);
      const inputs = [...card.querySelectorAll('input[data-answer]')];
      clearMarks(card);
      inputs.forEach(i => { i.value = i.dataset.answer; i.classList.add('correct'); });
      status.textContent = 'Correct answers filled in.';
      status.style.color = '#1d4ed8';
    }
    function resetAirway(id) {
      const card = document.querySelector(`[data-airway-id="${id}"]`);
      const status = document.getElementById(`status-${id}`);
      const inputs = [...card.querySelectorAll('input[data-answer]')];
      clearMarks(card); inputs.forEach(i => i.value = ''); status.textContent = '';
    }

    document.getElementById('app').innerHTML = airways.map(renderAirway).join('');
  </script>
</body>
</html>
